<header class="h-[var(--navbar-height)] sticky top-0 bg-white/60 backdrop-blur-xl border-b border-slate-200/50 flex items-center justify-between px-6 lg:px-8 transition-all duration-300">
  <!-- Left: Search & Title -->
  <div class="flex items-center gap-10">
    <div class="hidden md:flex items-center gap-3 bg-slate-100/50 px-4 py-2.5 rounded-2xl border border-slate-200/50 focus-within:border-indigo-500/50 focus-within:bg-white transition-all duration-300 min-w-[320px] group">
      <lucide-icon name="search" [size]="18" class="text-slate-400 group-focus-within:text-indigo-500"></lucide-icon>
      <input type="text" 
             placeholder="Buscar en el sistema..." 
             class="bg-transparent border-none outline-none text-sm font-medium w-full text-slate-600 placeholder:text-slate-400">
    </div>
  </div>

  <!-- Right: Actions & User -->
  <div class="flex items-center gap-4 lg:gap-6">
    <!-- Date/Time Display -->
    <div class="hidden lg:flex flex-col items-end px-4 border-r border-slate-200/60">
      <span class="text-xs font-bold text-slate-800 tracking-tight">{{ currentTime | date:'EEEE, d MMMM' }}</span>
      <span class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">{{ currentTime | date:'HH:mm:ss' }}</span>
    </div>

    <!-- Notifications -->
    <button class="relative w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-colors group">
      <lucide-icon name="bell" [size]="20" class="text-slate-600 group-hover:text-indigo-500 transition-colors"></lucide-icon>
      <span class="absolute top-2 right-2.5 w-2 h-2 bg-indigo-500 border-2 border-white rounded-full"></span>
    </button>

    <!-- User Profile Dropdown -->
    <div class="flex items-center gap-3 pl-4">
      <div class="flex flex-col items-end">
        <span class="text-xs font-bold text-slate-800">Admin User</span>
        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-tighter">Conectado</span>
      </div>
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 p-[1px] shadow-lg shadow-indigo-500/20">
        <div class="w-full h-full rounded-[14px] bg-white flex items-center justify-center overflow-hidden">
          <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff" 
               alt="User Avatar"
               class="w-full h-full object-cover">
        </div>
      </div>
    </div>
  </div>
</header>
