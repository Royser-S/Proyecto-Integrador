<div class="max-w-4xl mx-auto animate-fade-in p-2">
  <!-- Header -->
  <div class="flex items-center gap-4 mb-8">
    <button (click)="cancel()" 
            class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:border-indigo-200 transition-all shadow-sm">
      <lucide-icon name="arrow-left" [size]="18"></lucide-icon>
    </button>
    <div>
      <h1 class="text-3xl font-bold text-slate-900 tracking-tight font-outfit">
        {{ isEdit ? 'Editar Equipo' : 'Registrar Nuevo Equipo' }}
      </h1>
      <p class="text-slate-500 font-medium">Gestiona la información técnica y ubicación de tus activos</p>
    </div>
  </div>

  <!-- Form Card -->
  <div class="glass-card rounded-[2.5rem] border border-white/40 shadow-2xl shadow-slate-200/40 overflow-hidden bg-white/60 backdrop-blur-xl p-8 lg:p-12">
    <form #equipmentForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-10">
      
      <!-- Section 1: Basic Info -->
      <div class="space-y-6">
        <div class="flex items-center gap-3 pb-2 border-b border-slate-100">
          <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center">
            <lucide-icon name="info" [size]="16"></lucide-icon>
          </div>
          <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">Información General</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[11px] font-black uppercase tracking-widest text-slate-500 ml-1">Nombre del Activo</label>
            <div class="relative group">
              <lucide-icon name="monitor" [size]="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors"></lucide-icon>
              <input type="text" name="nombre" [(ngModel)]="equipment.nombre" 
                     placeholder="Ej: Servidor Central R740" required
                     class="w-full pl-12 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-black uppercase tracking-widest text-slate-500 ml-1">Código / Serial</label>
            <div class="relative group">
              <lucide-icon name="hash" [size]="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors"></lucide-icon>
              <input type="text" name="codigo" [(ngModel)]="equipment.codigo" 
                     placeholder="Ej: EQ-2024-XP90" required
                     class="w-full pl-12 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
            </div>
          </div>
        </div>
      </div>

      <!-- Section 2: Technical Detalis -->
      <div class="space-y-6">
        <div class="flex items-center gap-3 pb-2 border-b border-slate-100">
          <div class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center">
            <lucide-icon name="settings" [size]="16"></lucide-icon>
          </div>
          <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">Especificaciones Técnicas</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[11px] font-black uppercase tracking-widest text-slate-500 ml-1">Marca</label>
            <input type="text" name="marca" [(ngModel)]="equipment.marca" 
                   placeholder="Ej: Dell Technologies"
                   class="w-full px-5 py-3.5 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
          </div>
          <div class="space-y-2">
            <label class="text-[11px] font-black uppercase tracking-widest text-slate-500 ml-1">Modelo</label>
            <input type="text" name="modelo" [(ngModel)]="equipment.modelo" 
                   placeholder="Ej: PowerEdge R-Series"
                   class="w-full px-5 py-3.5 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
          </div>
        </div>
      </div>

      <!-- Section 3: Status & Location -->
      <div class="space-y-6">
        <div class="flex items-center gap-3 pb-2 border-b border-slate-100">
          <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center">
            <lucide-icon name="map-pin" [size]="16"></lucide-icon>
          </div>
          <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">Estado y Logística</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[11px] font-black uppercase tracking-widest text-slate-500 ml-1">Estado Operativo</label>
            <div class="relative">
              <select name="estado" [(ngModel)]="equipment.estado"
                      class="w-full px-5 py-3.5 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-bold text-slate-700 appearance-none cursor-pointer">
                <option value="OPERATIVO">OPERATIVO</option>
                <option value="MANTENIMIENTO">MANTENIMIENTO</option>
                <option value="FUERA_SERVICIO">FUERA DE SERVICIO</option>
              </select>
              <lucide-icon name="chevron-down" [size]="16" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></lucide-icon>
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-[11px] font-black uppercase tracking-widest text-slate-500 ml-1">Ubicación / Departamento</label>
            <input type="text" name="ubicacion" [(ngModel)]="equipment.ubicacion" 
                   placeholder="Ej: Data Center, Sala A-12"
                   class="w-full px-5 py-3.5 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="pt-8 flex items-center justify-end gap-4 border-t border-slate-100">
        <button type="button" (click)="cancel()" 
                class="px-8 py-3.5 text-xs font-black uppercase tracking-[0.2em] text-slate-400 hover:text-slate-600 transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="!equipmentForm.form.valid"
                class="px-10 py-3.5 bg-gradient-to-r from-slate-900 to-indigo-950 text-white rounded-2xl text-xs font-black uppercase tracking-[0.2em] shadow-xl shadow-slate-900/10 hover:shadow-slate-900/40 hover:-translate-y-1 active:translate-y-0 transition-all disabled:opacity-30 disabled:pointer-events-none disabled:grayscale">
          {{ isEdit ? 'Guardar Cambios' : 'Registrar Activo' }}
        </button>
      </div>
    </form>
  </div>
</div>
