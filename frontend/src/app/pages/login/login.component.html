<div class="login-wrapper min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Mesh Background -->
  <div class="mesh-bg"></div>
  
  <!-- Content -->
  <div class="w-full max-w-md relative z-10 animate-fade-in">
    <div class="glass-card p-8 lg:p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-500/10 border border-white/40">
      <div class="text-center mb-10">
        <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-3xl flex items-center justify-center shadow-xl shadow-indigo-500/30 mx-auto mb-6 transform hover:scale-110 transition-transform duration-500">
          <span class="text-3xl">📊</span>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight mb-2 font-outfit">Sudcom Gestión</h1>
        <p class="text-slate-500 font-medium">Bienvenido de nuevo al sistema</p>
      </div>

      <form (ngSubmit)="onLogin()" class="space-y-6">
        <div class="space-y-2">
          <label for="usuario" class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Usuario</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <lucide-icon name="user" [size]="18" class="text-slate-400 group-focus-within:text-indigo-500 transition-colors"></lucide-icon>
            </div>
            <input type="text" 
                   id="usuario" 
                   name="usuario" 
                   [(ngModel)]="usuario" 
                   placeholder="Nombre de usuario" 
                   class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all duration-300 font-medium text-slate-700"
                   required>
          </div>
        </div>

        <div class="space-y-2">
          <label for="password" class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Contraseña</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <lucide-icon name="lock" [size]="18" class="text-slate-400 group-focus-within:text-indigo-500 transition-colors"></lucide-icon>
            </div>
            <input type="password" 
                   id="password" 
                   name="password" 
                   [(ngModel)]="password" 
                   placeholder="••••••••" 
                   class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all duration-300 font-medium text-slate-700"
                   required>
          </div>
        </div>

        <div *ngIf="errorMessage" class="p-4 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3 animate-pulse">
          <lucide-icon name="alert-triangle" [size]="18" class="text-red-500 flex-shrink-0"></lucide-icon>
          <p class="text-xs font-bold text-red-600">{{ errorMessage }}</p>
        </div>

        <button type="submit" 
                class="w-full py-4 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-600/20 hover:shadow-indigo-600/40 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-2 group">
          <span>Acceder al Sistema</span>
          <lucide-icon name="log-in" [size]="18" class="group-hover:translate-x-1 transition-transform"></lucide-icon>
        </button>
      </form>

      <div class="mt-10 text-center">
        <p class="text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em]">© 2026 Sudcom Asset Management System</p>
      </div>
    </div>
  </div>
</div>
